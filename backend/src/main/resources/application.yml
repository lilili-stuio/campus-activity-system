server:
  port: 8080

spring:
  application:
    name: campus-activity-system

  # 默认使用 H2 内嵌数据库，无需安装 MySQL
  datasource:
    url: jdbc:h2:file:./data/campus_activity;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

app:
  jwt:
    secret: campus-activity-system-secret-key-2024-very-long-string
    expiration-ms: 86400000
